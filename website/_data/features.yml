headline: "Everything you need to enforce engineering standards"
items:
  - title: "Markdown-driven checks"
    description: "Materialize higher-level requirements into Markdown documents and enforce them automatically during code review. No proprietary DSL — just files in your repo."
    icon: "file-text"
  - title: "Best practice library"
    description: "Use the provided best practice library to bootstrap your project's review checks. Start with proven defaults, then customize to fit your team."
    icon: "library"
  - title: "Beyond linters and tests"
    description: "Enforce code best practices that are impossible to catch with linters, unit tests, integration tests, or any other kind of traditional testing."
    icon: "shield"
  - title: "Full control over the process"
    description: "Easily relax, harden, or introduce new requirements just by editing a Markdown file — or asking your coding agent to edit it for you."
    icon: "sliders"
  - title: "Auto-fix with agents"
    description: "Automatically spawn an agent to fix failing checks and ensure the PR meets your encoded best practices before it reaches a human reviewer."
    icon: "wand"
  - title: "BYOK — Bring Your Own Key"
    description: "Use the LLM and provider of your choice: OpenAI, Anthropic, LMStudio, Ollama, Zen, Bedrock, Azure, and more. OpenShrike uses OpenCode as its agent harness."
    icon: "key"
