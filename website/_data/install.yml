headline: "Get started in minutes"
prereq: 'Prerequisite: <a href="https://nodejs.org/en/download">Node.js 22+</a>'
methods:
  - name: "Linux / macOS"
    language: "bash"
    command: "curl -fsSL https://raw.githubusercontent.com/Network-Perspective/OpenShrike/main/install | bash"
  - name: "Windows PowerShell"
    language: "powershell"
    command: "irm https://raw.githubusercontent.com/Network-Perspective/OpenShrike/main/install.ps1 | iex"
quickstart:
  - command: "shrike init"
    description: "Interactive setup, configures your AI provider, lets you choose default policies:"
  - command: "shrike scan"
    description: "Runs the checks:"
  - command: "shrike fix"
    description: "Scan and fix failing checks:"
